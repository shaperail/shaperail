name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version without a leading v
        required: true
        type: string
      ref:
        description: Branch or commit to release from
        required: true
        default: main
        type: string
      dry_run:
        description: Run checks and builds without publishing crates or creating a tag/release
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  checks:
    name: Release Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shaperail_dev
          POSTGRES_USER: shaperail
          POSTGRES_PASSWORD: shaperail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shaperail -d shaperail_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shaperail:shaperail@localhost:5432/shaperail_dev
      REDIS_URL: redis://localhost:6379
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate release metadata
        run: bash .github/scripts/assert-release-version.sh "${RELEASE_VERSION}"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Audit dependencies
        run: cargo audit

      - name: Verify local install path
        run: cargo install --path shaperail-cli --locked --root /tmp/shaperail-install --force

      - name: Dry-run base crate publish
        run: cargo publish -p shaperail-core --dry-run --locked --allow-dirty

      - name: Compile benchmark targets
        run: cargo bench --workspace --no-run

  build:
    name: Build ${{ matrix.target }}
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: shaperail
            archive: shaperail-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: shaperail
            archive: shaperail-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: shaperail.exe
            archive: shaperail-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  publish:
    name: Publish to crates.io
    needs: build
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          bash .github/scripts/publish-crates.sh "${RELEASE_VERSION}"

  release:
    name: Create Release
    needs: [build, publish]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create or update Git tag and GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          release_tag="v${RELEASE_VERSION}"
          release_sha="$(git rev-parse HEAD)"
          notes_file="$(mktemp)"

          bash .github/scripts/extract-changelog-section.sh "${RELEASE_VERSION}" > "${notes_file}"

          if ! git ls-remote --tags origin "refs/tags/${release_tag}" | grep -q .; then
            git tag -a "${release_tag}" -m "${release_tag}" "${release_sha}"
            git push origin "refs/tags/${release_tag}"
          fi

          shopt -s globstar nullglob
          files=()
          for f in artifacts/**/*; do
            [[ -f "$f" ]] && files+=("$f")
          done
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" "${files[@]}" --clobber
          else
            gh release create "${release_tag}" "${files[@]}" \
              --verify-tag \
              --target "${release_sha}" \
              --notes-file "${notes_file}"
          fi
