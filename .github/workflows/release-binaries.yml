name: Release Binaries

# Triggered when release-plz creates a GitHub Release. Builds the shaperail
# CLI binary for five targets (Linux x86_64, Linux aarch64 via cross, macOS
# x86_64, macOS aarch64, Windows x86_64) and uploads each archive to the
# release.
#
# This is the only workflow that produces release artifacts; release-plz
# handles versioning, crates.io publishing, tagging, and release notes.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: shaperail
            archive: shaperail-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: shaperail
            archive: shaperail-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: shaperail.exe
            archive: shaperail-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: gh release upload "$TAG" "${{ matrix.archive }}" --clobber
