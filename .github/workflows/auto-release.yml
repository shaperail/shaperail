name: Auto Release

# Fires on every push to main. When the workspace version in Cargo.toml is
# ahead of the latest git tag a full release runs automatically: tests, binary
# builds, crates.io publish, GitHub Release, and docs (GitHub Pages rebuilds
# from docs/ on every main push via the legacy build setting).
#
# To cut a release:
#   1. Run the "Prepare Release" workflow (or bump the version manually in a PR).
#   2. Merge the version-bump PR — this workflow does the rest.
#
# No other manual steps are required.

on:
  push:
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: decide whether a release is needed ───────────────────────────
  check:
    name: Check for unreleased version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      do_release: ${{ steps.check.outputs.do_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check pending release
        id: check
        run: |
          version="$(bash .github/scripts/check-pending-release.sh)"
          if [[ "${version}" == "NO_RELEASE" ]]; then
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Workspace version matches latest tag — nothing to release."
          else
            echo "do_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "Unreleased version detected: ${version}"
          fi

  # ── Step 2: validate + test ───────────────────────────────────────────────
  validate:
    name: Validate and test
    needs: check
    if: needs.check.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shaperail_dev
          POSTGRES_USER: shaperail
          POSTGRES_PASSWORD: shaperail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shaperail -d shaperail_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shaperail:shaperail@localhost:5432/shaperail_dev
      REDIS_URL: redis://localhost:6379
      RELEASE_VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo fmt --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: bash .github/scripts/assert-release-version.sh "${RELEASE_VERSION}"
      - run: cargo install cargo-audit --locked
      - run: cargo audit

      - name: Tag release commit
        env:
          RELEASE_VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          if git ls-remote --tags origin "refs/tags/v${RELEASE_VERSION}" | grep -q .; then
            echo "Tag v${RELEASE_VERSION} already exists — skipping tag creation."
          else
            git tag -a "v${RELEASE_VERSION}" -m "v${RELEASE_VERSION}"
            git push origin "v${RELEASE_VERSION}"
          fi

  # ── Step 3a: build release binaries (parallel across targets) ────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [check, validate]
    if: needs.check.outputs.do_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: shaperail
            archive: shaperail-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: shaperail
            archive: shaperail-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: shaperail
            archive: shaperail-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: shaperail.exe
            archive: shaperail-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p shaperail-cli --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Step 3b: publish crates (parallel with build) ────────────────────────
  publish:
    name: Publish to crates.io
    needs: [check, validate]
    if: needs.check.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ needs.check.outputs.version }}
        run: bash .github/scripts/publish-crates.sh "${RELEASE_VERSION}"

  # ── Step 4: create GitHub release with binaries ───────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [check, build, publish]
    if: needs.check.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.check.outputs.version }}
        run: |
          notes_file="$(mktemp)"
          bash .github/scripts/extract-changelog-section.sh "${RELEASE_VERSION}" > "${notes_file}"

          shopt -s globstar nullglob
          files=()
          for f in artifacts/**/*; do
            [[ -f "$f" ]] && files+=("$f")
          done

          gh release create "v${RELEASE_VERSION}" "${files[@]}" \
            --verify-tag \
            --target "$(git rev-parse HEAD)" \
            --notes-file "${notes_file}"
