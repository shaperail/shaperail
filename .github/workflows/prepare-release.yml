name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version without a leading v
        required: true
        type: string
      base_ref:
        description: Branch to prepare the release from
        required: true
        default: main
        type: string
      changelog_summary:
        description: Optional changelog bullets, one per line
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Apply release version
        env:
          CHANGELOG_SUMMARY: ${{ inputs.changelog_summary }}
        run: bash .github/scripts/set-release-version.sh "${{ inputs.version }}"

      - name: Refresh lockfile
        run: cargo check --workspace

      - name: Validate release metadata
        run: bash .github/scripts/assert-release-version.sh "${{ inputs.version }}"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          BASE_REF: ${{ inputs.base_ref }}
          CHANGELOG_SUMMARY: ${{ inputs.changelog_summary }}
        run: |
          branch="codex/release-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${branch}"

          if git diff --quiet; then
            echo "No release changes were generated." >&2
            exit 1
          fi

          git add Cargo.toml Cargo.lock CHANGELOG.md docs/_config.yml \
            shaperail-codegen/Cargo.toml shaperail-runtime/Cargo.toml shaperail-cli/Cargo.toml
          git commit -m "chore(release): prepare v${VERSION}"
          git push --force-with-lease origin "${branch}"

          pr_url="$(gh pr list --head "${branch}" --state open --json url --jq '.[0].url')"
          if [[ -n "${pr_url}" ]]; then
            echo "Release PR already open: ${pr_url}"
            exit 0
          fi

          body_file="$(mktemp)"
          {
            echo "## Release v${VERSION}"
            echo
            echo "Prepared automatically from \`${BASE_REF}\`."
            echo
            echo "### Checklist"
            echo
            echo "- [ ] Review version bump and changelog"
            echo "- [ ] Confirm CI is green"
            echo "- [ ] Merge this PR before running the \`Release\` workflow"
            if [[ -n "${CHANGELOG_SUMMARY}" ]]; then
              echo
              echo "### Changelog summary"
              echo
              printf '%s\n' "${CHANGELOG_SUMMARY}"
            fi
          } > "${body_file}"

          gh pr create \
            --base "${BASE_REF}" \
            --head "${branch}" \
            --title "chore(release): prepare v${VERSION}" \
            --body-file "${body_file}"
