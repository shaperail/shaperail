name: Release Commands

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  dispatch:
    name: Dispatch release workflow from issue comment
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Route release command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          body="$(jq -r '.comment.body' "${GITHUB_EVENT_PATH}")"
          association="$(jq -r '.comment.author_association' "${GITHUB_EVENT_PATH}")"
          issue_title="$(jq -r '.issue.title' "${GITHUB_EVENT_PATH}")"
          release_label="$(jq -r '.issue.labels[].name' "${GITHUB_EVENT_PATH}" | grep -Fx "release" || true)"

          case "${association}" in
            OWNER|MEMBER|COLLABORATOR)
              ;;
            *)
              echo "Ignoring comment from ${association}."
              exit 0
              ;;
          esac

          if [[ -z "${release_label}" && ! "${issue_title}" =~ ^Release[[:space:]]v?[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Ignoring non-release issue."
            exit 0
          fi

          workflow=""
          version=""
          dry_run=""

          if [[ "${body}" =~ ^/prepare-release[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$ ]]; then
            workflow="prepare-release.yml"
            version="${BASH_REMATCH[1]}"
          elif [[ "${body}" =~ ^/release[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$ ]]; then
            workflow="release.yml"
            version="${BASH_REMATCH[1]}"
            dry_run="false"
          elif [[ "${body}" =~ ^/release-dry-run[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$ ]]; then
            workflow="release.yml"
            version="${BASH_REMATCH[1]}"
            dry_run="true"
          else
            echo "Ignoring non-release command."
            exit 0
          fi

          if [[ "${workflow}" == "prepare-release.yml" ]]; then
            gh workflow run "${workflow}" \
              --ref main \
              -f version="${version}" \
              -f base_ref=main

            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "Queued \`Prepare Release\` for \`v${version}\`. Review the generated PR once the workflow completes."
            exit 0
          fi

          gh workflow run "${workflow}" \
            --ref main \
            -f version="${version}" \
            -f ref=main \
            -f dry_run="${dry_run}"

          if [[ "${dry_run}" == "true" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "Queued \`Release\` dry-run for \`v${version}\`. Check the Actions tab for the validation run."
          else
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --body "Queued the \`Release\` workflow for \`v${version}\`. Watch the Actions tab for crates.io publishing, tagging, and GitHub Release creation."
          fi
