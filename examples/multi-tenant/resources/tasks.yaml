resource: tasks
version: 1
tenant_key: org_id

schema:
  id:         { type: uuid, primary: true, generated: true }
  org_id:     { type: uuid, ref: organizations.id, required: true }
  project_id: { type: uuid, ref: projects.id, required: true }
  title:      { type: string, min: 1, max: 500, required: true }
  priority:   { type: enum, values: [low, medium, high, urgent], default: medium }
  status:     { type: enum, values: [todo, in_progress, done], default: todo }
  assigned_to: { type: uuid }
  created_by: { type: uuid, required: true }
  created_at: { type: timestamp, generated: true }
  updated_at: { type: timestamp, generated: true }

endpoints:
  list:
    auth: [member, admin]
    filters: [project_id, status, priority, assigned_to]
    search: [title]
    pagination: cursor
    sort: [created_at, priority]

  get:
    auth: [member, admin]

  create:
    auth: [member, admin]
    input: [project_id, title, priority, assigned_to, created_by]

  update:
    auth: [member, admin]
    input: [title, priority, status, assigned_to]

  delete:
    auth: [admin, owner]
    soft_delete: true

relations:
  project: { resource: projects, type: belongs_to, key: project_id }

indexes:
  - { fields: [org_id, project_id] }
  - { fields: [org_id, status] }
  - { fields: [assigned_to] }
