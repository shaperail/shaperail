resource: items
version: 1

schema:
  id:         { type: uuid, primary: true, generated: true }
  name:       { type: string, min: 1, max: 200, required: true }
  email:      { type: string, format: email, required: true }
  created_at: { type: timestamp, generated: true }
  updated_at: { type: timestamp, generated: true }

endpoints:
  list:
    method: GET
    path: /items
    auth: public
    pagination: cursor

  create:
    method: POST
    path: /items
    auth: [admin, member]
    input: [name, email]
    controller:
      before: "wasm:./plugins/validate_email.wasm"

  update:
    method: PATCH
    path: /items/:id
    auth: [admin, owner]
    input: [name, email]
    controller:
      before: "wasm:./plugins/normalize_input.wasm"
