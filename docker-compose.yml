# Shaperail Framework — Dev Environment
# Usage: docker compose up -d
# Then set: DATABASE_URL=postgresql://shaperail:shaperail@localhost:5433/shaperail_dev
#           REDIS_URL=redis://localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shaperail_dev
      POSTGRES_USER: shaperail
      POSTGRES_PASSWORD: shaperail
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaperail -d shaperail_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
