# SteelAPI Framework — CI Test Environment
# Usage: docker compose -f docker-compose.ci.yml up --abort-on-container-exit

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: steelapi_test
      POSTGRES_USER: steel
      POSTGRES_PASSWORD: steel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steel -d steelapi_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://steel:steel@postgres:5432/steelapi_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: test-secret-not-for-production
    command: cargo test --workspace
