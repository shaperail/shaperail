title: Shaperail
description: Deterministic Rust backend generation from explicit YAML resources.
url: https://shaperail.io
baseurl: ""
repository: shaperail/shaperail
release_version: 0.9.0
markdown: kramdown
permalink: pretty
remote_theme: just-the-docs/just-the-docs@v0.12.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
kramdown:
  input: GFM
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: Back to top
aux_links:
  GitHub: https://github.com/shaperail/shaperail
  crates.io: https://crates.io/crates/shaperail-cli
  Releases: https://github.com/shaperail/shaperail/releases
footer_content: "Shaperail documentation lives in the same repository as the framework so every release has versioned instructions. Documentation for v{{ site.release_version }}."
exclude:
  - superpowers/
