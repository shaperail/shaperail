resource: users
version: 1

schema:
  id:             { type: uuid, primary: true, generated: true }
  org_id:         { type: uuid, ref: organizations.id, required: true }
  email:          { type: string, format: email, unique: true, required: true }
  name:           { type: string, min: 1, max: 200, required: true }
  role:           { type: enum, values: [super_admin, admin, finance, viewer], default: viewer }
  password:       { type: string, min: 1, max: 255, sensitive: true }
  password_hash:  { type: string, min: 1, max: 255, sensitive: true }
  deleted_at:     { type: timestamp, nullable: true }
  created_at:     { type: timestamp, generated: true }
  updated_at:     { type: timestamp, generated: true }

endpoints:
  list:
    method: GET
    path: /users
    auth: [super_admin, admin]
    filters: [role, org_id]
    search: [name, email]
    sort: [created_at, email]
    pagination: cursor

  get:
    method: GET
    path: /users/:id
    auth: [super_admin, admin, owner]

  create:
    method: POST
    path: /users
    auth: [super_admin, admin]
    input: [email, name, role, org_id, password]
    controller: { before: hash_password }

  update:
    method: PATCH
    path: /users/:id
    auth: [super_admin, admin, owner]
    input: [name, role]

  delete:
    method: DELETE
    path: /users/:id
    auth: [super_admin, admin]
    soft_delete: true

relations:
  organization: { resource: organizations, type: belongs_to, key: org_id }

indexes:
  - fields: [org_id, role]
  - { fields: [email], unique: true }
