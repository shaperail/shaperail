resource: organizations
version: 1

schema:
  id:             { type: uuid, primary: true, generated: true }
  name:           { type: string, min: 1, max: 200, required: true }
  plan:           { type: enum, values: [free, growth, enterprise], default: free }
  base_currency:  { type: string, min: 3, max: 3, required: true }
  gl_provider:    { type: enum, values: [none, quickbooks_online, netsuite, csv], default: none }
  created_at:     { type: timestamp, generated: true }
  updated_at:     { type: timestamp, generated: true }

endpoints:
  list:
    method: GET
    path: /organizations
    auth: [super_admin]
    sort: [created_at, name]
    pagination: cursor

  get:
    method: GET
    path: /organizations/:id
    auth: [super_admin, admin, finance, viewer]

  create:
    method: POST
    path: /organizations
    auth: [super_admin]
    input: [name, plan, base_currency, gl_provider]

  update:
    method: PATCH
    path: /organizations/:id
    auth: [super_admin, admin]
    input: [name, plan, gl_provider]

  delete:
    method: DELETE
    path: /organizations/:id
    auth: [super_admin]
    soft_delete: true

indexes:
  - fields: [name]
